seed_everything: 42
model:
  class_path: methods.dct.TrainDeepColorTransfer
  init_args:
    n_patches: 64
    patch_shape: [128, 128]
    max_hw: 262144
data:
  class_path: utils.data.DataModule
  init_args:
    data_dir: Artificial Dataset
    batch_size: 8
    num_workers: 8
trainer:
  max_epochs: 100
  logger:
    class_path: pytorch_lightning.loggers.WandbLogger
    init_args:
      project: color-transfer
      log_model: true
  callbacks:
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
