seed_everything: 42
model:
  class_path: methods.dmsct.TrainDeepColorTransfer
  init_args:
    batch_size: 8
    patch_shape: [128, 128]
data:
  class_path: utils.data.DataModule
  init_args:
    data_dir: Artificial Dataset
    num_workers: 8
trainer:
  max_epochs: 100
  logger:
      class_path: pytorch_lightning.loggers.WandbLogger
      init_args:
        project: color-transfer
        log_model: true
  callbacks:
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
